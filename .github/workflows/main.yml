name: clinical-r1-zero-ci

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'pyproject.toml'
      - '.github/workflows/main.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest test/ -v
